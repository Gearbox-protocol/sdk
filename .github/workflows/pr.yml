name: Check PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

env:
  HUSKY: 0
  CI: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "v1.5.1"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Perform checks
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY_CI }}
          RPC_URL: "https://eth-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_KEY_CI }}"
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck:ci
          pnpm check:ci
          pnpm test:all
