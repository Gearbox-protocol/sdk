name: Release

on:
  push:
    branches:
      - "master"
      - "next"
      - "kyc"
      - "*.x"

permissions:
  contents: read

env:
  HUSKY: 0
  CI: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "v1.5.1"

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - name: Test and build
        env:
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY_CI }}
          RPC_URL: "https://eth-mainnet.g.alchemy.com/v2/${{ secrets.ALCHEMY_KEY_CI }}"
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck:ci
          pnpm test:all
          pnpm build

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
